<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lubina —— 桌面学习伙伴</title>
  <link rel="icon" href="/Lubina.svg" type="image/svg+xml">

  <!-- FOUC 防护：在 CSS 加载前恢复字体大小 -->
  <script>
  (function(){
    var s = localStorage.getItem('lubina_font_size');
    if (s) document.documentElement.style.fontSize = (13.5 * parseFloat(s)) + 'px';
  })();
  </script>

  <!-- 样式：基础 → 布局 → 组件 -->
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <!-- 用户自定义主题 -->
  <link rel="stylesheet" href="/user/theme.css" id="userTheme">

  <!-- 第三方库（npm 安装，无 CDN 追踪警告）-->
  <script src="/node_modules/marked/lib/marked.umd.js"></script>
  <script src="/node_modules/katex/dist/katex.min.js"></script>
  <link rel="stylesheet" href="/node_modules/katex/dist/katex.min.css">

</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 顶部导航栏（全宽）                                            -->
<!-- ═══════════════════════════════════════════════════════════ -->
<header class="top-navbar" id="topNavbar" data-tauri-drag-region>
  <div class="navbar-left">
    <a class="navbar-logo" href="javascript:void(0)" onclick="App.showPage('home');return false;" title="Lubina —— 点击回到 AI 对话首页">
      <img class="navbar-logo-img" src="/Lubina.svg" alt="Lubina" onerror="this.style.display='none'">
      <span class="navbar-logo-icon" style="display:none;">AI</span>
      <span>Lubina</span>
    </a>
  </div>
  <div class="navbar-right">
    <div style="position:relative;" id="navbarUserArea">
      <button class="navbar-avatar-btn" id="navbarAvatarBtn" onclick="App.toggleAvatarDropdown()" title="用户">
        <span class="navbar-avatar-img" id="navbarAvatarIcon"></span>
        <span class="navbar-avatar-label" id="navbarAvatarLabel">未登录</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text-tip);"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="avatar-dropdown" id="avatarDropdown">
        <div id="dropdownGuest">
          <div class="avatar-dropdown-user">
            <div class="avatar-dropdown-user-icon"></div>
            <div class="avatar-dropdown-user-info">
              <div class="avatar-dropdown-user-name">未登录</div>
              <div class="avatar-dropdown-user-email">登录后同步设置</div>
            </div>
          </div>
          <button class="avatar-dropdown-item" onclick="App.showLoginModal()">登录 / 注册</button>
        </div>
        <div id="dropdownLoggedIn" class="hidden">
          <div class="avatar-dropdown-user">
            <div class="avatar-dropdown-user-icon" id="dropdownUserIcon">U</div>
            <div class="avatar-dropdown-user-info">
              <div class="avatar-dropdown-user-name" id="dropdownUserName">用户</div>
              <div class="avatar-dropdown-user-email" id="dropdownUserEmail"></div>
            </div>
          </div>
          <button class="avatar-dropdown-item" onclick="App.showPage('settings')">个人设置</button>
          <div class="avatar-dropdown-sep"></div>
          <button class="avatar-dropdown-item danger" onclick="App.logout()">退出登录</button>
        </div>
      </div>
    </div>
    <!-- 窗口控制按钮（最小化 / 最大化 / 关闭）-->
    <div class="window-controls" data-tauri-no-drag-region>
      <button class="win-btn win-btn-minimize" onclick="Bridge.windowMinimize()" title="最小化">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="win-btn win-btn-maximize" onclick="Bridge.windowToggleMaximize()" title="最大化">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      </button>
      <button class="win-btn win-btn-close" onclick="Bridge.windowClose()" title="关闭">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- ================================================================ -->
<!--  IDE 四区布局外壳                                                  -->
<!-- ================================================================ -->
<div class="app-shell" id="appShell">

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- 区域 1：文件浏览器面板                                        -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <aside class="file-explorer" id="fileExplorer">
    <div class="explorer-toolbar">
      <button class="explorer-toolbar-btn" data-action="open-folder" title="选择文件夹打开">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
      <div class="explorer-search">
        <input type="text" placeholder="搜索文件…">
      </div>
    </div>
    <div class="explorer-tree" id="fileTree">
      <div class="explorer-empty">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <p>尚未打开文件夹</p>
        <button class="btn btn-ghost btn-sm" data-action="open-folder-empty">打开文件夹</button>
      </div>
    </div>
  </aside>

  <!-- 文件树 ↔ 活动栏 拖拽手柄 -->
  <div class="shell-handle shell-handle-fe" id="shellHandleFE"></div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- 区域 2：活动栏（图标导航）                                    -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <nav class="activity-bar" id="activityBar">
    <div class="activity-bar-top">
      <button class="activity-btn active" data-page="home" data-tooltip="AI 对话">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
      <button class="activity-btn" data-page="editor" data-tooltip="文件编辑器">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </button>
      <button class="activity-btn" data-page="exercises" data-tooltip="错题本">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="M9 14l2 2 4-4"/>
        </svg>
      </button>
      <button class="activity-btn" data-page="knowledge" data-tooltip="知识库">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </button>
    </div>
    <div class="activity-bar-spacer"></div>
    <div class="activity-bar-bottom">
      <button class="activity-btn" data-page="settings" data-tooltip="设置">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- 区域 3：主内容区                                              -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <main class="main-area" id="mainArea">
    <div class="split-root single" id="panelContainer">
      <!-- 页面由 app.js 动态渲染到这里 -->
    </div>
  </main>

</div><!-- /app-shell -->

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 全局 UI 层                                                    -->
<!-- ═══════════════════════════════════════════════════════════ -->

<!-- 右键菜单 -->
<div class="context-menu" id="contextMenu"></div>

<!-- Toast 通知容器 -->
<div class="toast-container" id="toastContainer"></div>

<!-- 登录 / 注册模态框 -->
<div class="modal-overlay hidden" id="loginModalOverlay" onclick="if(event.target===this)App.closeLoginModal()">
  <div class="modal-dialog" style="max-width:380px;">
    <h3 id="loginModalTitle">登录</h3>
    <p id="loginModalDesc">登录后可在多设备间同步设置和 API Key</p>
    <!-- 登录表单 -->
    <form id="loginForm" onsubmit="App.handleLogin(event)">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" class="input" id="loginEmail" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" class="input" id="loginPassword" placeholder="······" required autocomplete="current-password">
      </div>
      <div class="modal-actions" style="margin-top:16px;">
        <button type="button" class="btn btn-ghost" onclick="App.switchLoginMode()" id="loginSwitchBtn">还没有账号？注册</button>
        <button type="submit" class="btn btn-primary" id="loginSubmitBtn">登录</button>
      </div>
    </form>
  </div>
</div>

<!-- ================================================================ -->
<!-- JS 模块（按依赖顺序加载）                                          -->
<!-- ================================================================ -->
<script src="js/api.js"></script>
<script src="js/bridge.js"></script>
<script src="js/file-explorer.js"></script>
<script src="js/editor.js"></script>
<script src="js/chat.js"></script>
<script src="js/settings.js"></script>
<script src="js/knowledge.js"></script>
<script src="js/app.js"></script>

<script>
  // 页面切换时，app.js 会直接调用对应模块的 mount()
  // 各模块（Chat/Editor/Settings）通过 SPA 生命周期 mount/destroy 管理
</script>

</body>
</html>
